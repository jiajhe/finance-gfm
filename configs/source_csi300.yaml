market: csi300
handler: Alpha158
provider_uri: ~/.qlib/qlib_data/cn_data
cache_dir: ~/.qlib_cache

splits:
  train: [2010-01-01, 2020-12-31]
  valid: [2021-01-01, 2021-12-31]
  test: [2022-01-01, 2025-12-31]

model:
  name: fdg
  rank: 32
  tau: 1.0
  d_hidden: 128
  dropout: 0.1
  b_init: identity_perturbed

train:
  batch_size: 8
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-5
  loss: ic
  early_stop_patience: 10
  grad_clip: 3.0
  seed: 2026

log:
  out_dir: results/
  exp_name: fdg_csi300_r32
