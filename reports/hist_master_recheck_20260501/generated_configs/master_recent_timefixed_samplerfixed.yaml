qlib_init:
  provider_uri: /home/jiajun/.qlib/qlib_data/cn_data_2024h1
  region: cn
  kernels: 4
market: csi300_aligned
benchmark: SH000300
data_handler_config: &data_handler_config
  start_time: 2010-01-01
  end_time: "2025-09-17"
  fit_start_time: 2010-01-01
  fit_end_time: 2020-12-31
  instruments: csi300_aligned
  infer_processors:
    - class: RobustZScoreNorm
      kwargs:
        fields_group: feature
        clip_outlier: true
    - class: Fillna
      kwargs:
        fields_group: feature
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs:
        fields_group: label
  label:
    - Ref($close, -2) / Ref($close, -1) - 1
market_data_handler_config: &market_data_handler_config
  start_time: 2010-01-01
  end_time: "2025-09-17"
  fit_start_time: 2010-01-01
  fit_end_time: 2020-12-31
  instruments: csi300_aligned
  infer_processors:
    - class: RobustZScoreNorm
      kwargs:
        fields_group: feature
        clip_outlier: true
    - class: Fillna
      kwargs:
        fields_group: feature
port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 30
      n_drop: 30
  backtest:
    start_time: 2022-01-01
    end_time: "2025-09-17"
    account: 100000000
    benchmark: SH000300
    exchange_kwargs:
      deal_price: close
task:
  model:
    class: MASTERModelFixedSampler
    module_path: models.master_fixed_ts
    kwargs:
      seed: 0
      n_epochs: 40
      lr: 0.000008
      train_stop_loss_thred:
      market: csi300
      benchmark: SH000300
      save_prefix: recent_timefixed_samplerfixed_
      GPU: 0
  dataset:
    class: MASTERTSDatasetH
    module_path: qlib.contrib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2010-01-01, 2020-12-31]
        valid: [2021-01-01, 2021-12-31]
        test: [2022-01-01, "2025-09-17"]
      step_len: 8
      market_data_handler_config: *market_data_handler_config
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        model: <MODEL>
        dataset: <DATASET>
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
        ann_scaler: 252
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
