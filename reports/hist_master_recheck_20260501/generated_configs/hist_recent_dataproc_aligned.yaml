qlib_init:
  provider_uri: /home/jiajun/.qlib/qlib_data/cn_data_2024h1
  region: cn
  kernels: 4
market: csi300_aligned
benchmark: SH000300
data_handler_config: &data_handler_config
  start_time: 2010-01-01
  end_time: "2025-09-17"
  fit_start_time: 2010-01-01
  fit_end_time: 2020-12-31
  instruments: csi300_aligned
  process_type: independent
  infer_processors:
    - class: DropCol
      kwargs:
        col_list: [VWAP0]
    - class: CSZFillna
      kwargs:
        fields_group: feature
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
  learn_processors:
    - class: DropCol
      kwargs:
        col_list: [VWAP0]
    - class: DropnaProcessor
      kwargs:
        fields_group: feature
    - class: DropnaLabel
    - class: CSZScoreNorm
      kwargs:
        fields_group: feature
    - class: CSZScoreNorm
      kwargs:
        fields_group: label
  label:
    - Ref($close, -2) / Ref($close, -1) - 1
port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 50
      n_drop: 5
  backtest:
    start_time: 2022-01-01
    end_time: "2025-09-17"
    account: 100000000
    benchmark: SH000300
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: close
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5
task:
  model:
    class: HIST
    module_path: qlib.contrib.model.pytorch_hist
    kwargs:
      d_feat: 157
      hidden_size: 64
      num_layers: 2
      dropout: 0.0
      n_epochs: 60
      lr: 0.0001
      batch_size: 800
      early_stop: 12
      metric: ic
      loss: mse
      base_model: LSTM
      model_path:
      stock2concept: /home/jiajun/refs/qlib_sjtu/examples/benchmarks/HIST/qlib_csi300_stock2concept.npy
      stock_index: /home/jiajun/finance-gfm/results/hist_master_recheck_20260430/aux/qlib_csi300_stock_index_lower.npy
      n_jobs: 4
      GPU: 0
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2010-01-01, 2020-12-31]
        valid: [2021-01-01, 2021-12-31]
        test: [2022-01-01, "2025-09-17"]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        model: <MODEL>
        dataset: <DATASET>
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
        ann_scaler: 252
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
